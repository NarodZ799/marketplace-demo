<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDELKA — доска объявлений · демо</title>
<style>
  :root{
    --bg:#f5f6f8; --card:#ffffff; --ink:#1a1d23; --muted:#8a919e;
    --accent:#0ea5a0; --accent-dark:#0b807c; --hot:#ff5c39; --line:#e6e8ec;
    --radius:14px; --shadow:0 1px 3px rgba(20,24,33,.07),0 8px 24px rgba(20,24,33,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink)}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none}

  .topbar{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
  .topbar-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:16px;padding:12px 20px;flex-wrap:wrap}
  .logo{font-size:24px;font-weight:800;letter-spacing:-.5px;color:var(--accent);white-space:nowrap}
  .logo span{color:var(--hot)}
  .demo-badge{font-size:10px;background:#fff3ef;color:var(--hot);border:1px solid #ffd9cd;border-radius:6px;padding:2px 6px;font-weight:700;vertical-align:middle;margin-left:6px}
  .city{font-size:13px;color:var(--muted);white-space:nowrap;cursor:pointer}
  .city b{color:var(--ink)}
  .search-wrap{flex:1;display:flex;min-width:220px}
  .search-wrap input{flex:1;border:2px solid var(--accent);border-right:none;border-radius:10px 0 0 10px;padding:10px 14px;font-size:14px;outline:none}
  .search-wrap button{background:var(--accent);color:#fff;border-radius:0 10px 10px 0;padding:0 20px;font-weight:600;font-size:14px}
  .cur-switch{display:flex;background:var(--bg);border-radius:9px;padding:3px}
  .cur-switch button{padding:6px 10px;font-size:13px;border-radius:7px;color:var(--muted);font-weight:600}
  .cur-switch button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
  .fav-btn{position:relative;font-size:20px}
  .fav-count{position:absolute;top:-6px;right:-10px;background:var(--hot);color:#fff;font-size:10px;font-weight:700;border-radius:9px;padding:1px 5px}
  .post-btn{background:var(--hot);color:#fff;font-weight:700;font-size:14px;padding:10px 18px;border-radius:10px;white-space:nowrap}
  .post-btn:hover{filter:brightness(1.07)}

  .cats{max-width:1200px;margin:0 auto;padding:14px 20px 0;display:flex;gap:8px;overflow-x:auto}
  .cat{background:#fff;border:1px solid var(--line);border-radius:20px;padding:8px 16px;font-size:13.5px;font-weight:600;white-space:nowrap;color:#3c4250}
  .cat.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  .layout{max-width:1200px;margin:0 auto;display:flex;gap:20px;padding:18px 20px 60px;align-items:flex-start}
  .filters{width:240px;flex-shrink:0;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;position:sticky;top:76px}
  .filters h3{font-size:15px;margin-bottom:14px}
  .fgroup{margin-bottom:16px}
  .fgroup label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
  .fgroup select,.fgroup input{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13.5px;background:#fff;outline:none}
  .price-row{display:flex;gap:8px}
  .reset{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px;font-size:13px;color:var(--muted);font-weight:600}
  .reset:hover{color:var(--ink)}

  .content{flex:1;min-width:0}
  .result-line{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
  .result-line h2{font-size:19px}
  .result-line span{font-size:13px;color:var(--muted)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:14px}
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative}
  .card:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(20,24,33,.12)}
  .thumb{height:150px;display:flex;align-items:center;justify-content:center;font-size:46px;position:relative}
  .badge{position:absolute;top:8px;left:8px;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(255,255,255,.92)}
  .badge.top{color:var(--hot)}
  .badge.ver{color:var(--accent-dark)}
  .heart{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.92);border-radius:8px;width:30px;height:30px;font-size:15px;display:flex;align-items:center;justify-content:center}
  .cbody{padding:11px 13px 13px}
  .price{font-size:16.5px;font-weight:800}
  .title{font-size:13.5px;margin:4px 0 6px;line-height:1.35;color:#2a2f38}
  .meta{font-size:12px;color:var(--muted)}

  .modal-bg{position:fixed;inset:0;background:rgba(15,18,24,.55);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto}
  .modal-bg.open{display:flex}
  .modal{background:#fff;border-radius:18px;max-width:760px;width:100%;overflow:hidden;animation:pop .18s ease}
  @keyframes pop{from{transform:scale(.97);opacity:0}to{transform:scale(1);opacity:1}}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 22px;border-bottom:1px solid var(--line)}
  .modal-head h3{font-size:17px}
  .close{font-size:22px;color:var(--muted);line-height:1}
  .modal-body{padding:22px}
  .gallery{display:grid;grid-template-columns:2fr 1fr;gap:8px;margin-bottom:18px}
  .gallery .main{height:260px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:72px}
  .gallery .side{display:flex;flex-direction:column;gap:8px}
  .gallery .side div{flex:1;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:30px;opacity:.85}
  .m-price{font-size:26px;font-weight:800;margin-bottom:4px}
  .m-loc{font-size:13px;color:var(--muted);margin-bottom:14px}
  .m-desc{font-size:14px;line-height:1.6;color:#3c4250;margin-bottom:18px}
  .specs{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px;margin-bottom:20px}
  .spec{font-size:13px;padding:8px 0;border-bottom:1px dashed var(--line);display:flex;justify-content:space-between}
  .spec b{font-weight:600}
  .spec span{color:var(--muted)}
  .seller{display:flex;align-items:center;gap:12px;background:var(--bg);border-radius:12px;padding:14px;margin-bottom:16px}
  .avatar{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px}
  .seller-info{flex:1}
  .seller-info b{font-size:14px;display:block}
  .seller-info span{font-size:12px;color:var(--muted)}
  .stars{color:#f5a623;font-size:12px}
  .cta-row{display:flex;gap:10px;flex-wrap:wrap}
  .cta{flex:1;min-width:150px;padding:13px;border-radius:11px;font-size:14.5px;font-weight:700;text-align:center}
  .cta.green{background:var(--accent);color:#fff}
  .cta.blue{background:#2aabee;color:#fff}
  .cta.ghost{background:var(--bg);color:var(--ink)}

  .form-grid{display:grid;gap:14px}
  .form-grid label{font-size:12.5px;font-weight:700;color:#3c4250;display:block;margin-bottom:5px}
  .form-grid input,.form-grid select,.form-grid textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:14px;outline:none;background:#fff}
  .form-grid textarea{min-height:90px;resize:vertical}
  .upload{border:2px dashed var(--line);border-radius:11px;padding:24px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer}
  .upload:hover{border-color:var(--accent);color:var(--accent-dark)}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:13px 22px;border-radius:12px;font-size:14px;z-index:200;opacity:0;transition:all .25s;box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

  .empty{padding:60px 20px;text-align:center;color:var(--muted)}
  .empty div{font-size:44px;margin-bottom:10px}

  footer{border-top:1px solid var(--line);background:#fff;padding:22px;text-align:center;font-size:12.5px;color:var(--muted)}

  @media (max-width:820px){
    .filters{display:none}
    .gallery{grid-template-columns:1fr}
    .gallery .side{flex-direction:row;height:70px}
    .topbar-inner{gap:10px}
    .search-wrap{order:5;min-width:100%}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a class="logo" href="#">SDELKA<span>.</span><span class="demo-badge">ДЕМО</span></a>
    <div class="city" onclick="toast('Выбор города — в полной версии')">📍 <b id="cityLabel">Паттайя</b> ▾</div>
    <div class="search-wrap">
      <input id="q" placeholder="Поиск: кондо, вилла, байк, iPhone…" oninput="render()">
      <button onclick="render()">Найти</button>
    </div>
    <div class="cur-switch" id="curSwitch"></div>
    <button class="fav-btn" onclick="toast(favs.size? 'В избранном: '+favs.size : 'Избранное пусто')">❤️<span class="fav-count" id="favCount" style="display:none">0</span></button>
    <button class="post-btn" onclick="openPost()">+ Разместить объявление</button>
  </div>
</div>

<div class="cats" id="cats"></div>

<div class="layout">
  <aside class="filters">
    <h3>Фильтры</h3>
    <div class="fgroup"><label>Город</label>
      <select id="fCity" onchange="render()">
        <option value="">Все города</option><option>Паттайя</option><option>Бангкок</option><option>Пхукет</option><option>Самуи</option>
      </select>
    </div>
    <div class="fgroup"><label>Цена, <span class="curName">฿</span></label>
      <div class="price-row"><input id="fMin" type="number" placeholder="от" oninput="render()"><input id="fMax" type="number" placeholder="до" oninput="render()"></div>
    </div>
    <div class="fgroup" id="dealGroup"><label>Тип сделки</label>
      <select id="fDeal" onchange="render()"><option value="">Любой</option><option value="sale">Продажа</option><option value="rent">Аренда</option></select>
    </div>
    <div class="fgroup"><label>Продавец</label>
      <select id="fSeller" onchange="render()"><option value="">Все</option><option value="ver">Проверенные</option><option value="agency">Агентства</option><option value="private">Частные</option></select>
    </div>
    <button class="reset" onclick="resetFilters()">Сбросить фильтры</button>
  </aside>

  <main class="content">
    <div class="result-line"><h2 id="resTitle">Все объявления</h2><span id="resCount"></span></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none"><div>🔍</div>Ничего не найдено — измените фильтры</div>
  </main>
</div>

<footer>SDELKA — демо-прототип для оценки концепции. Все объекты, цены и продавцы вымышленные. © 2026</footer>

<!-- Listing modal -->
<div class="modal-bg" id="viewBg" onclick="if(event.target===this)closeView()">
  <div class="modal"><div class="modal-head"><h3 id="vTitle"></h3><button class="close" onclick="closeView()">✕</button></div>
    <div class="modal-body" id="vBody"></div>
  </div>
</div>

<!-- Post modal -->
<div class="modal-bg" id="postBg" onclick="if(event.target===this)closePost()">
  <div class="modal"><div class="modal-head"><h3>Новое объявление</h3><button class="close" onclick="closePost()">✕</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div><label>Категория</label><select><option>Недвижимость</option><option>Транспорт</option><option>Электроника</option><option>Услуги</option><option>Работа</option></select></div>
        <div><label>Заголовок</label><input placeholder="Например: Кондо 1BR у моря, Джомтьен"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div><label>Цена</label><input type="number" placeholder="0"></div>
          <div><label>Город</label><select><option>Паттайя</option><option>Бангкок</option><option>Пхукет</option><option>Самуи</option></select></div>
        </div>
        <div><label>Описание</label><textarea placeholder="Расскажите о товаре или объекте…"></textarea></div>
        <div><label>Фотографии</label><div class="upload" onclick="toast('Загрузка фото — в полной версии')">📷 Перетащите до 10 фото или нажмите</div></div>
        <button class="cta green" onclick="submitPost()">Опубликовать</button>
        <div style="font-size:12px;color:var(--muted);text-align:center">Объявление пройдёт модерацию перед публикацией</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CURS={ "฿":1, "$":0.028, "€":0.026, "₽":2.55 };
let cur="฿";

const CATS=["Все","Недвижимость","Транспорт","Электроника","Услуги","Работа","Личные вещи"];
let activeCat="Все";

// price in THB
const L=[

];

const favs=new Set();

// ---------- render ----------
function money(thb){
  const v=thb*CURS[cur];
  const s=v>=100? Math.round(v).toLocaleString('ru-RU') : v.toFixed(0);
  return s+" "+cur;
}
function renderCats(){
  document.getElementById('cats').innerHTML=CATS.map(c=>
    `<button class="cat ${c===activeCat?'on':''}" onclick="setCat('${c}')">${c}</button>`).join('');
}
function setCat(c){activeCat=c;render();renderCats();
  document.getElementById('resTitle').textContent=c==="Все"?"Все объявления":c;}
function renderCurs(){
  document.getElementById('curSwitch').innerHTML=Object.keys(CURS).map(c=>
    `<button class="${c===cur?'on':''}" onclick="setCur('${c}')">${c}</button>`).join('');
  document.querySelectorAll('.curName').forEach(e=>e.textContent=cur);
}
function setCur(c){cur=c;renderCurs();render();}
function filtered(){
  const q=document.getElementById('q').value.toLowerCase();
  const city=document.getElementById('fCity').value;
  const min=+document.getElementById('fMin').value||0;
  const max=+document.getElementById('fMax').value||Infinity;
  const deal=document.getElementById('fDeal').value;
  const st=document.getElementById('fSeller').value;
  return L.filter(x=>
    (activeCat==="Все"||x.cat===activeCat)&&
    (!q||x.title.toLowerCase().includes(q)||x.cat.toLowerCase().includes(q))&&
    (!city||x.city===city)&&
    (x.price*CURS[cur]>=min&&x.price*CURS[cur]<=max)&&
    (!deal||x.deal===deal)&&
    (!st||(st==="ver"?x.ver:st===x.seller.t))
  );
}
function render(){
  const items=filtered();
  document.getElementById('resCount').textContent=items.length+" объявл.";
  document.getElementById('empty').style.display=items.length?'none':'block';
  document.getElementById('grid').innerHTML=items.map(x=>`
    <div class="card" onclick="openView(${x.id})">
      <div class="thumb" style="background:${x.g}">${x.em}
        ${x.top?'<span class="badge top">🔥 ТОП</span>':(x.ver?'<span class="badge ver">✓ Проверен</span>':'')}
        <button class="heart" onclick="event.stopPropagation();fav(${x.id},this)">${favs.has(x.id)?'❤️':'🤍'}</button>
      </div>
      <div class="cbody">
        <div class="price">${money(x.price)}${x.deal==='rent'?'<small style="font-weight:400;color:var(--muted)"> /мес</small>':''}</div>
        <div class="title">${x.title}</div>
        <div class="meta">${x.city}${x.area&&x.area!=='—'?' · '+x.area:''} · сегодня</div>
      </div>
    </div>`).join('');
  const fc=document.getElementById('favCount');
  fc.style.display=favs.size?'block':'none';fc.textContent=favs.size;
}
function fav(id,el){favs.has(id)?favs.delete(id):favs.add(id);render();}
function resetFilters(){['fCity','fDeal','fSeller'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('fMin').value='';document.getElementById('fMax').value='';
  document.getElementById('q').value='';setCat('Все');}

// ---------- view modal ----------
function openView(id){
  const x=L.find(i=>i.id===id);
  document.getElementById('vTitle').textContent=x.cat;
  document.getElementById('vBody').innerHTML=`
    <div class="gallery">
      <div class="main" style="background:${x.g}">${x.em}</div>
      <div class="side"><div style="background:${x.g}">${x.em}</div><div style="background:${x.g}">📷</div><div style="background:${x.g}">📷</div></div>
    </div>
    <div class="m-price">${money(x.price)}${x.deal==='rent'?' <small style="font-size:14px;font-weight:400;color:var(--muted)">в месяц</small>':''}</div>
    <div class="m-loc">📍 ${x.city}${x.area&&x.area!=='—'?', '+x.area:''} · размещено сегодня · 214 просмотров</div>
    <div class="m-desc"><b>${x.title}</b><br><br>${x.d}</div>
    <div class="specs">${Object.entries(x.specs).map(([k,v])=>`<div class="spec"><span>${k}</span><b>${v}</b></div>`).join('')}</div>
    <div class="seller">
      <div class="avatar">${x.seller.n[0]}</div>
      <div class="seller-info"><b>${x.seller.n} ${x.ver?'<span style="color:var(--accent-dark)">✓</span>':''}</b>
        <span>${x.seller.t==='agency'?'Компания':'Частное лицо'} · ${x.seller.deals} сделок · <span class="stars">★★★★★</span> 4.9</span></div>
      <button class="cta ghost" style="flex:0;min-width:auto;padding:9px 14px" onclick="toast('Профиль продавца — в полной версии')">Профиль</button>
    </div>
    <div class="cta-row">
      <button class="cta green" onclick="toast('Показ телефона: +66 8X XXX XX XX (демо)')">📞 Показать телефон</button>
      <button class="cta blue" onclick="toast('Переход в Telegram-чат с продавцом — в полной версии')">✈️ Написать в Telegram</button>
      <button class="cta ghost" onclick="toast('Внутренний чат — в полной версии')">💬 Чат на сайте</button>
    </div>`;
  document.getElementById('viewBg').classList.add('open');
}
function closeView(){document.getElementById('viewBg').classList.remove('open')}
function openPost(){document.getElementById('postBg').classList.add('open')}
function closePost(){document.getElementById('postBg').classList.remove('open')}
function submitPost(){closePost();toast('✅ Объявление отправлено на модерацию (демо)')}

let tt;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2600);
}

renderCats();renderCurs();render();
</script>
</body>
</html>
